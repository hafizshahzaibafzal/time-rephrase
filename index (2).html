<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Time Rephrase — AI Writing Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --border: #252a38;
    --accent: #e8c84a;
    --accent2: #4ae8b4;
    --text: #eaeef8;
    --muted: #5a6180;
    --card: #1a1f2e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,200,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,200,74,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-1 { background: rgba(232,200,74,0.07); top: -150px; left: -150px; }
  .glow-2 { background: rgba(74,232,180,0.05); bottom: -150px; right: -150px; }

  header {
    position: relative;
    z-index: 10;
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent2); font-style: italic; }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  main {
    position: relative;
    z-index: 10;
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    line-height: 1.15;
    margin-bottom: 12px;
    color: var(--text);
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    margin-bottom: 48px;
    max-width: 480px;
    line-height: 1.7;
  }

  /* MODE TABS */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 5px;
    border-radius: 12px;
    border: 1px solid var(--border);
    width: fit-content;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #0d0f14;
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:focus-within::before { opacity: 1; }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.95rem;
    line-height: 1.75;
    resize: none;
    min-height: 140px;
  }
  textarea::placeholder { color: var(--muted); }

  /* STYLE CHIPS */
  .style-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .chip {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .chip.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(74,232,180,0.08);
  }
  .chip:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  /* BUTTON */
  .run-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .run-btn:hover { background: #f0d660; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .run-btn .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #0d0f14;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .run-btn.loading .spinner { display: block; }
  .run-btn.loading .btn-text { opacity: 0.7; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* OUTPUT */
  .output-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    display: none;
    animation: fadeUp 0.4s ease;
  }
  .output-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .output-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .output-text {
    font-size: 0.97rem;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* SUMMARIZE MODE */
  #summarize-section { display: none; }
  #summarize-section.active { display: block; }
  #rephrase-section { display: block; }
  #rephrase-section.active { display: block; }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: right;
    margin-top: 8px;
  }

  /* TONE METER (summarize) */
  .length-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    align-items: center;
  }
  .length-row span {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 4px;
  }

  .error-msg {
    color: #ff6b6b;
    font-size: 0.83rem;
    margin-top: 12px;
    padding: 10px 16px;
    background: rgba(255,107,107,0.08);
    border-radius: 8px;
    border: 1px solid rgba(255,107,107,0.2);
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
  <div class="logo">Time<span>Rephrase</span></div>
  <div class="badge">● AI Powered</div>
</header>

<main>
  <h1>Summarize &<br><em>Rephrase</em> Like a Human.</h1>
  <p class="subtitle">Paste any text — get a natural, human-sounding summary or rephrased version in seconds.</p>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchMode('rephrase')">✦ Rephrase</button>
    <button class="tab" onclick="switchMode('summarize')">⬡ Summarize</button>
  </div>

  <!-- REPHRASE SECTION -->
  <div id="rephrase-section">
    <div class="card">
      <label>Your Text</label>
      <textarea id="rephrase-input" placeholder="Paste or type your text here..." oninput="updateCount('rephrase-input','rephrase-count')"></textarea>
      <div class="char-count" id="rephrase-count">0 characters</div>
    </div>

    <div class="style-row">
      <span style="font-size:0.75rem;color:var(--muted);align-self:center;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;">Tone →</span>
      <button class="chip active" onclick="selectChip(this, 'rephrase-style')">Natural</button>
      <button class="chip" onclick="selectChip(this, 'rephrase-style')">Formal</button>
      <button class="chip" onclick="selectChip(this, 'rephrase-style')">Casual</button>
      <button class="chip" onclick="selectChip(this, 'rephrase-style')">Creative</button>
      <button class="chip" onclick="selectChip(this, 'rephrase-style')">Professional</button>
    </div>

    <button class="run-btn" onclick="runRephrase()">
      <div class="spinner"></div>
      <span class="btn-text">Rephrase Text →</span>
    </button>
    <div class="error-msg" id="rephrase-error"></div>
  </div>

  <!-- SUMMARIZE SECTION -->
  <div id="summarize-section">
    <div class="card">
      <label>Your Text</label>
      <textarea id="summarize-input" placeholder="Paste a long article, document, or passage..." oninput="updateCount('summarize-input','summarize-count')"></textarea>
      <div class="char-count" id="summarize-count">0 characters</div>
    </div>

    <div class="length-row">
      <span>Length →</span>
      <button class="chip active" onclick="selectChip(this, 'summarize-length')">Short</button>
      <button class="chip" onclick="selectChip(this, 'summarize-length')">Medium</button>
      <button class="chip" onclick="selectChip(this, 'summarize-length')">Detailed</button>
    </div>

    <button class="run-btn" onclick="runSummarize()">
      <div class="spinner"></div>
      <span class="btn-text">Summarize Text →</span>
    </button>
    <div class="error-msg" id="summarize-error"></div>
  </div>

  <!-- OUTPUT -->
  <div class="divider"></div>
  <div class="output-card" id="output-card">
    <div class="output-header">
      <div class="output-label" id="output-label">✦ Result</div>
      <button class="copy-btn" onclick="copyOutput()">Copy</button>
    </div>
    <div class="output-text" id="output-text"></div>
  </div>
</main>

<script>
  let currentMode = 'rephrase';

  function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (i===0 && mode==='rephrase') || (i===1 && mode==='summarize'));
    });
    document.getElementById('rephrase-section').style.display = mode==='rephrase' ? 'block' : 'none';
    document.getElementById('summarize-section').style.display = mode==='summarize' ? 'block' : 'none';
    document.getElementById('output-card').classList.remove('visible');
  }

  function updateCount(inputId, countId) {
    const len = document.getElementById(inputId).value.length;
    document.getElementById(countId).textContent = len + ' characters';
  }

  function selectChip(el, group) {
    el.closest('.style-row, .length-row').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  function getActiveChip(container) {
    return container.querySelector('.chip.active')?.textContent || '';
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('visible');
  }
  function hideError(id) {
    document.getElementById(id).classList.remove('visible');
  }

  async function callClaude(prompt) {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    return data.content.map(b => b.text || '').join('');
  }

  async function runRephrase() {
    const text = document.getElementById('rephrase-input').value.trim();
    if (!text) { showError('rephrase-error', 'Please enter some text to rephrase.'); return; }
    hideError('rephrase-error');

    const tone = getActiveChip(document.getElementById('rephrase-section'));
    const btn = document.querySelector('#rephrase-section .run-btn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const prompt = `Rephrase the following text in a ${tone.toLowerCase()} and human-like tone. Make it sound natural, not robotic. Only return the rephrased text, nothing else.\n\nText:\n${text}`;
      const result = await callClaude(prompt);
      showOutput('✦ Rephrased', result);
    } catch(e) {
      showError('rephrase-error', 'Error: ' + e.message);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  async function runSummarize() {
    const text = document.getElementById('summarize-input').value.trim();
    if (!text) { showError('summarize-error', 'Please enter some text to summarize.'); return; }
    hideError('summarize-error');

    const length = getActiveChip(document.getElementById('summarize-section'));
    const lengthMap = { 'Short': '2-3 sentences', 'Medium': '1 short paragraph', 'Detailed': '2-3 paragraphs' };
    const btn = document.querySelector('#summarize-section .run-btn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const prompt = `Summarize the following text in ${lengthMap[length] || '1 paragraph'}. Write it in a natural, human-like way. Only return the summary, nothing else.\n\nText:\n${text}`;
      const result = await callClaude(prompt);
      showOutput('⬡ Summary', result);
    } catch(e) {
      showError('summarize-error', 'Error: ' + e.message);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showOutput(label, text) {
    document.getElementById('output-label').textContent = label;
    document.getElementById('output-text').textContent = text;
    const card = document.getElementById('output-card');
    card.classList.remove('visible');
    void card.offsetWidth;
    card.classList.add('visible');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyOutput() {
    const text = document.getElementById('output-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied ✓';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
</html>
